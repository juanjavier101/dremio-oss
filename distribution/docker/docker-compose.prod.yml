name: dremio-cluster

# Shared configuration for all Dremio nodes.
# - image:   pre-built via `docker build --build-arg DOWNLOAD_URL=<url> -t dremio-oss:local .`
# - restart: recover automatically after container crash or VM reboot
# - logging: json-file with rotation to prevent disk exhaustion
# - ulimits: Dremio requires at least 65536 open file descriptors
x-dremio-common: &dremio-common
  image: dremio-oss:${DREMIO_IMAGE_TAG:-local}
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: "100m"
      max-file: "5"
  ulimits:
    nofile:
      soft: 65536
      hard: 65536
  networks:
    - dremio-net

services:

  coordinator:
    <<: *dremio-common
    container_name: dremio-coordinator
    hostname: coordinator
    ports:
      - "9047:9047"    # Web UI / REST API
      - "31010:31010"  # JDBC/ODBC client endpoint
      - "32010:32010"  # Arrow Flight
      - "45678:45678"  # Fabric RPC — remove if not needed externally
    environment:
      # Route all Dremio logs through Docker (visible via `docker logs dremio-coordinator`)
      DREMIO_LOG_TO_CONSOLE: "true"
      # JVM memory. Coordinator needs more heap for catalog and query planning.
      # Tune based on available VM RAM. Heap + Direct must not exceed available RAM.
      # Tip: leave ~2 GB headroom for the OS and other JVM overhead.
      DREMIO_MAX_HEAP_MEMORY_SIZE_MB: "${COORDINATOR_HEAP_MB:-8192}"
      DREMIO_MAX_DIRECT_MEMORY_SIZE_MB: "${COORDINATOR_DIRECT_MB:-4096}"
    volumes:
      - ./cluster/coordinator/dremio.conf:/opt/dremio/conf/dremio.conf:ro
      # Host bind mounts — run `scripts/setup-host.sh` first to create these.
      - ${DATA_ROOT:-/opt/dremio/data}/coordinator:/opt/dremio/data
      - ${DATA_ROOT:-/opt/dremio/data}/dist:/opt/dremio/dist
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9047/apiv2/server_status"]
      interval: 30s
      timeout: 10s
      retries: 15
      start_period: 120s

  executor-1:
    <<: *dremio-common
    container_name: dremio-executor-1
    hostname: executor-1
    depends_on:
      coordinator:
        condition: service_healthy
    environment:
      DREMIO_LOG_TO_CONSOLE: "true"
      # Executors use less heap but more direct memory for query processing.
      DREMIO_MAX_HEAP_MEMORY_SIZE_MB: "${EXECUTOR_HEAP_MB:-4096}"
      DREMIO_MAX_DIRECT_MEMORY_SIZE_MB: "${EXECUTOR_DIRECT_MB:-8192}"
    volumes:
      - ./cluster/executor/dremio.conf:/opt/dremio/conf/dremio.conf:ro
      - ${DATA_ROOT:-/opt/dremio/data}/executor-1:/opt/dremio/data
      - ${DATA_ROOT:-/opt/dremio/data}/dist:/opt/dremio/dist

  executor-2:
    <<: *dremio-common
    container_name: dremio-executor-2
    hostname: executor-2
    depends_on:
      coordinator:
        condition: service_healthy
    environment:
      DREMIO_LOG_TO_CONSOLE: "true"
      DREMIO_MAX_HEAP_MEMORY_SIZE_MB: "${EXECUTOR_HEAP_MB:-4096}"
      DREMIO_MAX_DIRECT_MEMORY_SIZE_MB: "${EXECUTOR_DIRECT_MB:-8192}"
    volumes:
      - ./cluster/executor/dremio.conf:/opt/dremio/conf/dremio.conf:ro
      - ${DATA_ROOT:-/opt/dremio/data}/executor-2:/opt/dremio/data
      - ${DATA_ROOT:-/opt/dremio/data}/dist:/opt/dremio/dist

  executor-3:
    <<: *dremio-common
    container_name: dremio-executor-3
    hostname: executor-3
    depends_on:
      coordinator:
        condition: service_healthy
    environment:
      DREMIO_LOG_TO_CONSOLE: "true"
      DREMIO_MAX_HEAP_MEMORY_SIZE_MB: "${EXECUTOR_HEAP_MB:-4096}"
      DREMIO_MAX_DIRECT_MEMORY_SIZE_MB: "${EXECUTOR_DIRECT_MB:-8192}"
    volumes:
      - ./cluster/executor/dremio.conf:/opt/dremio/conf/dremio.conf:ro
      - ${DATA_ROOT:-/opt/dremio/data}/executor-3:/opt/dremio/data
      - ${DATA_ROOT:-/opt/dremio/data}/dist:/opt/dremio/dist

networks:
  dremio-net:
    driver: bridge
